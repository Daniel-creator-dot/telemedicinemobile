name: bytzgo_mobile
description: BytzGo — cross-platform delivery app (iOS & Android).
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  dio: ^5.7.0
  flutter_secure_storage: ^9.2.4
  socket_io_client: ^3.0.2
  provider: ^6.1.2
  go_router: ^14.6.2
  firebase_core: ^3.8.1
  firebase_messaging: ^15.1.6
  flutter_local_notifications: ^18.0.1
  google_sign_in: ^6.2.2
  google_maps_flutter: ^2.10.0
  geolocator: ^13.0.2
  permission_handler: ^11.3.1
  url_launcher: ^6.3.1
  webview_flutter: ^4.10.0
  flutter_ringtone_player: ^4.0.0+4
  image_picker: ^1.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/branding/app_icon.png
    - assets/branding/app_logo.png
    - assets/branding/preloader.png
    - assets/branding/hero_login.png
    - assets/branding/hero_delivery.png
    - assets/branding/hero_rider.png
    - assets/branding/onboarding_rider.png
    - assets/branding/onboarding_team.png
    - assets/branding/onboarding_delivery.png
