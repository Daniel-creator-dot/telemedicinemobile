# Render Blueprint — Digi Health Telemedicine API
# Connect this repo on Render Dashboard, then apply the Blueprint or create services manually.
# Docs: https://render.com/docs/blueprint-spec

databases:
  - name: telemedicine-db
    plan: free
    region: oregon
    databaseName: telemedicine
    user: telemedicine

services:
  - type: web
    name: telemedicine-api
    runtime: node
    region: oregon
    plan: free
    rootDir: server
    buildCommand: npm install --include=dev
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: telemedicine-db
          property: connectionString
      - key: PAYSTACK_SECRET_KEY
        sync: false
      - key: PAYSTACK_CALLBACK_URL
        value: https://standard.paystack.co/close
